{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h1>Login</h1>
    <p>Access your ABC Telecom account</p>
</section>

<section class="contact-form">

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit" class="btn">
            Login
        </button>

    </form>

</section>

{% endblock %}
